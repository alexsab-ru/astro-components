name: Generate Astro Files from XML

on:
  schedule:
    - cron: '0 3-17 * * *'  # Запускается каждый час с 3 до 17 (UTC) — 06:00 до 20:00 по МСК
  push:
    paths:
      - '.github/scripts/sh/getAirStorage.sh'
      - '.github/scripts/sh/getDealerCarsPrice.sh'
      - '.github/scripts/sh/getDealerPrices.sh'
      - '.github/scripts/sh/getDealerServicePrices.sh'
      - '.github/scripts/sh/getDealerStorage.sh'
      - '.github/scripts/sh/getSortStorage.sh'
      - '.github/scripts/CarFeedProcessorCSV.py'
      - '.github/scripts/config_air_storage-friend.json'
      - '.github/scripts/config_air_storage.json'
      - '.github/scripts/config.py'
      - '.github/scripts/getOneXML.py'
      - '.github/scripts/GSheetFetcher.js'
      - '.github/scripts/mergeCarPrices.js'
      - '.github/scripts/update_cars_air_storage.py'
      - '.github/scripts/update_cars.py'
      - '.github/scripts/utils.py'
      - '.github/workflows/update_cars.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  determine_env:

    if: ${{ vars.UPDATE_CARS && vars.UPDATE_CARS == 'true' }}

    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set_env.outputs.env_name }}
    steps:
      - id: set_env
        run: |
          PROD_BRANCHES=("main" "master" "brand" "dealer") # Bash array
          CURRENT_BRANCH="${{ github.ref_name }}"
          IS_PROD=false
          for branch in "${PROD_BRANCHES[@]}"; do
            if [[ "$CURRENT_BRANCH" == "$branch" ]]; then
              IS_PROD=true
              break
            fi
          done
          if $IS_PROD; then
            echo "env_name=production" >> $GITHUB_OUTPUT
          else
            echo "env_name=development" >> $GITHUB_OUTPUT
          fi

  build:
    needs: determine_env
    runs-on: ubuntu-latest

    # Указываете окружение и его переменные
    environment:
      name: ${{ needs.determine_env.outputs.env_name }}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '25'

    - name: Cache pnpm dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.pnpm-store
          node_modules
          .pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Init output.txt
      run: |
        > output.txt

    - name: Install dependencies
      run: |
        npm install -g pnpm
        pnpm install --no-frozen-lockfile
        pnpm downloadCommonRepo -f settings.json,env.json --skip-model-sections
      env:
        JSON_REPO: ${{ secrets.JSON_REPO }}
        DOMAIN: ${{ vars.DOMAIN }}
        FINE_GRAINED_PAT: ${{ secrets.FINE_GRAINED_PAT }}
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'
        architecture: "x64"

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests lxml pyyaml Pillow beautifulsoup4

    - name: Load env.json into environment
      run: |
        if [ -f src/data/env.json ]; then
          node -e '
            const data = JSON.parse(require("fs").readFileSync("src/data/env.json","utf8"));
            for (const [k,v] of Object.entries(data)) {
              if (typeof v === "object") console.log(k+"="+JSON.stringify(v));
              else console.log(k+"="+v);
            }
          ' >> $GITHUB_ENV
          echo "✅ env.json loaded into environment"
        else
          echo "⚠ src/data/env.json not found — skipping"
        fi

    - name: Get Dealer cars Storage
      if: ${{ env.DEALER_STORAGE_CSV_URL }}
      run: |
        pnpm run getDealerStorage_new_cars_xml
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        CSV_URL: ${{ env.DEALER_STORAGE_CSV_URL }}
        DEALER_STORAGE_CSV_URL: ${{ env.DEALER_STORAGE_CSV_URL }}
        QUERY_STRING: ${{ env.DEALER_STORAGE_CSV_COLUMN }}
        DEALER_STORAGE_CSV_COLUMN: ${{ env.DEALER_STORAGE_CSV_COLUMN }}

    - name: Get Dealer used_cars Storage
      if: ${{ env.USED_CARS_STORAGE_CSV_URL }}
      run: |
        pnpm run getDealerStorage_used_cars_xml
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        CSV_URL: ${{ env.USED_CARS_STORAGE_CSV_URL }}
        USED_CARS_STORAGE_CSV_URL: ${{ env.USED_CARS_STORAGE_CSV_URL }}
        QUERY_STRING: ${{ env.USED_CARS_STORAGE_CSV_COLUMN }}
        USED_CARS_STORAGE_CSV_COLUMN: ${{ env.USED_CARS_STORAGE_CSV_COLUMN }}

    - name: Get Avito Dealer cars Storage
      if: ${{ env.AVITO_DEALER_STORAGE_CSV_URL }}
      run: |
        pnpm run getDealerStorage_avito_xml
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        CSV_URL: ${{ env.AVITO_DEALER_STORAGE_CSV_URL }}
        AVITO_DEALER_STORAGE_CSV_URL: ${{ env.AVITO_DEALER_STORAGE_CSV_URL }}
        QUERY_STRING: ${{ env.AVITO_DEALER_STORAGE_CSV_COLUMN }}
        AVITO_DEALER_STORAGE_CSV_COLUMN: ${{ env.AVITO_DEALER_STORAGE_CSV_COLUMN }}


    - name: Get XML from Avito to get dealer photos for cars
      if: ${{ env.DEALER_PHOTOS_FOR_CARS_AVITO_URL }}
      run: |
        pnpm run getOne_DEALER_PHOTOS_FOR_CARS_AVITO_URL
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.DEALER_PHOTOS_FOR_CARS_AVITO_URL }}
        DEALER_PHOTOS_FOR_CARS_AVITO_URL: ${{ env.DEALER_PHOTOS_FOR_CARS_AVITO_URL }}

    - name: Get cars data_cars_car XML
      if: ${{ env.XML_URL_DATA_CARS_CAR }}
      run: |
        pnpm getOne_XML_URL_DATA_CARS_CAR
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.XML_URL_DATA_CARS_CAR }}
        XML_URL_DATA_CARS_CAR: ${{ env.XML_URL_DATA_CARS_CAR }}

    - name: Get cars catalog_vehicles_vehicle XML
      if: ${{ env.XML_URL_CATALOG_VEHICLES_VEHICLE }}
      run: |
        pnpm getOne_XML_URL_CATALOG_VEHICLES_VEHICLE
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.XML_URL_CATALOG_VEHICLES_VEHICLE }}
        XML_URL_CATALOG_VEHICLES_VEHICLE: ${{ env.XML_URL_CATALOG_VEHICLES_VEHICLE }}

    - name: Get cars vehicles_vehicle XML
      if: ${{ env.XML_URL_VEHICLES_VEHICLE }}
      run: |
        pnpm getOne_XML_URL_VEHICLES_VEHICLE
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.XML_URL_VEHICLES_VEHICLE }}
        XML_URL_VEHICLES_VEHICLE: ${{ env.XML_URL_VEHICLES_VEHICLE }}

    - name: Get cars ads_ad XML
      if: ${{ env.XML_URL_ADS_AD }}
      run: |
        pnpm getOne_XML_URL_ADS_AD
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.XML_URL_ADS_AD }}
        XML_URL_ADS_AD: ${{ env.XML_URL_ADS_AD }}

    - name: Get cars carcopy_offers_offer XML
      if: ${{ env.XML_URL_CARCOPY_OFFERS_OFFER }}
      run: |
        pnpm getOne_XML_URL_CARCOPY_OFFERS_OFFER
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.XML_URL_CARCOPY_OFFERS_OFFER }}
        XML_URL_CARCOPY_OFFERS_OFFER: ${{ env.XML_URL_CARCOPY_OFFERS_OFFER }}

    - name: Get used_cars data_cars_car XML
      if: ${{ env.USED_CARS_DATA_CARS_CAR }}
      run: |
        pnpm getOne_USED_CARS_DATA_CARS_CAR
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.USED_CARS_DATA_CARS_CAR }}
        USED_CARS_DATA_CARS_CAR: ${{ env.USED_CARS_DATA_CARS_CAR }}

    - name: Get used_cars catalog_vehicles_vehicle XML
      if: ${{ env.USED_CARS_CATALOG_VEHICLES_VEHICLE }}
      run: |
        pnpm getOne_USED_CARS_CATALOG_VEHICLES_VEHICLE
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.USED_CARS_CATALOG_VEHICLES_VEHICLE }}
        USED_CARS_CATALOG_VEHICLES_VEHICLE: ${{ env.USED_CARS_CATALOG_VEHICLES_VEHICLE }}

    - name: Get used_cars vehicles_vehicle XML
      if: ${{ env.USED_CARS_VEHICLES_VEHICLE }}
      run: |
        pnpm getOne_USED_CARS_VEHICLES_VEHICLE
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.USED_CARS_VEHICLES_VEHICLE }}
        USED_CARS_VEHICLES_VEHICLE: ${{ env.USED_CARS_VEHICLES_VEHICLE }}

    - name: Get used_cars ads_ad XML
      if: ${{ env.USED_CARS_ADS_AD }}
      run: |
        pnpm getOne_USED_CARS_ADS_AD
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.USED_CARS_ADS_AD }}
        USED_CARS_ADS_AD: ${{ env.USED_CARS_ADS_AD }}

    - name: Get used_cars carcopy_offers_offer XML
      if: ${{ env.USED_CARS_CARCOPY_OFFERS_OFFER }}
      run: |
        pnpm getOne_USED_CARS_CARCOPY_OFFERS_OFFER
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.USED_CARS_CARCOPY_OFFERS_OFFER }}
        USED_CARS_CARCOPY_OFFERS_OFFER: ${{ env.USED_CARS_CARCOPY_OFFERS_OFFER }}

    - name: Get air storage
      if: ${{ env.AIR_STORAGE_CSV_URL }}
      run: |
        pnpm run getAirStorage
      env:
        CSV_URL: ${{ env.AIR_STORAGE_CSV_URL }}
        AIR_STORAGE_CSV_URL: ${{ env.AIR_STORAGE_CSV_URL }}

    - name: Get sort storage
      if: ${{ env.SORT_STORAGE_CSV_URL }}
      run: |
        pnpm run getSortStorage
      env:
        CSV_URL: ${{ env.SORT_STORAGE_CSV_URL }}
        SORT_STORAGE_CSV_URL: ${{ env.SORT_STORAGE_CSV_URL }}

    - name: Get Dealer JSON cars price
      if: ${{ env.DEALER_CARS_PRICE_CSV_URL }}
      run: |
        pnpm run getDealerCarsPrice
      env:
        CSV_URL: ${{ env.DEALER_CARS_PRICE_CSV_URL }}
        DEALER_CARS_PRICE_CSV_URL: ${{ env.DEALER_CARS_PRICE_CSV_URL }}


    - name: Generate src/content/cars/ and src/content/used_cars/
      run: |
        pnpm cars auto
      env:
        DOMAIN: ${{ vars.DOMAIN }}

    - name: Get Dealer XML for auto.ru and generate auto.ru xml
      if: ${{ env.AUTORU_XML_URL && !env.AUTORU_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py
        python .github/scripts/update_cars_air_storage.py --source_type autoru  --output_path "./public/autoru.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.AUTORU_XML_URL }}
        AUTORU_XML_URL: ${{ env.AUTORU_XML_URL }}

    - name: Get Dealer AutoRu xml if friend url exists
      if: ${{ env.AUTORU_XML_URL && env.AUTORU_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py
        python .github/scripts/update_cars_air_storage.py --source_type autoru --output_path="./public/autoru_dc.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.AUTORU_XML_URL }}
        AUTORU_XML_URL: ${{ env.AUTORU_XML_URL }}

    - name: Get friends AutoRu xml
      if: ${{ env.AUTORU_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py --output_path="cars_friend.xml"
        python .github/scripts/update_cars_air_storage.py --source_type autoru --input_file cars_friend.xml --output_path="./public/autoru_friend.xml" --config_path="./.github/scripts/config_air_storage-friend.json"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.AUTORU_FRIEND_XML_URL }}
        AUTORU_FRIEND_XML_URL: ${{ env.AUTORU_FRIEND_XML_URL }}

    - name: Merge AutoRu xmls
      if: ${{ env.AUTORU_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py --output_path="./public/autoru.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: "./public/autoru_dc.xml ./public/autoru_friend.xml"

    - name: Get Dealer XML for avito and generate avito xml if friend url not exists
      if: ${{ env.AVITO_XML_URL_DATA_CARS_CAR }}
      run: |
        python .github/scripts/getOneXML.py
        python .github/scripts/update_cars_air_storage.py --source_type autoru --output_path="./public/avito.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: "${{ env.AVITO_XML_URL_DATA_CARS_CAR }} ./tmp/feeds/avito/csv/cars.xml"
        AVITO_XML_URL_DATA_CARS_CAR: ${{ env.AVITO_XML_URL_DATA_CARS_CAR }}

    - name: Get Dealer XML for avito and generate avito xml if friend url not exists
      if: ${{ env.AVITO_XML_URL && !env.AVITO_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py
        python .github/scripts/update_cars_air_storage.py --source_type avito --output_path="./public/avito.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: "${{ env.AVITO_XML_URL }} ./tmp/feeds/avito/csv/cars.xml"
        AVITO_XML_URL: ${{ env.AVITO_XML_URL }}

    - name: Get Dealer Avito xml if friend url exists
      if: ${{ env.AVITO_XML_URL && env.AVITO_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py
        python .github/scripts/update_cars_air_storage.py --source_type avito --output_path="./public/avito_dc.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.AVITO_XML_URL }}
        AVITO_XML_URL: ${{ env.AVITO_XML_URL }}

    - name: Get friends Avito xml
      if: ${{ env.AVITO_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py --output_path="cars_friend.xml"
        python .github/scripts/update_cars_air_storage.py --source_type avito --input_file cars_friend.xml --output_path="./public/avito_friend.xml" --config_path="./.github/scripts/config_air_storage-friend.json"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: ${{ env.AVITO_FRIEND_XML_URL }}
        AVITO_FRIEND_XML_URL: ${{ env.AVITO_FRIEND_XML_URL }}

    - name: Merge Avito xmls
      if: ${{ env.AVITO_FRIEND_XML_URL }}
      run: |
        python .github/scripts/getOneXML.py --output_path="./public/avito.xml"
      env:
        DOMAIN: ${{ vars.DOMAIN }}
        XML_URL: "./public/avito_dc.xml ./public/avito_friend.xml ./tmp/feeds/avito/csv/cars.xml"

    - name: Set output
      id: set_output
      run: |
        if [ -s output.txt ]; then
          echo "$(cat output.txt)" > output_wrapped.txt
          # Кодируем содержимое файла в base64
          encoded_output=$(base64 -w 0 output_wrapped.txt)
          # Передаем закодированное значение
          echo "script_output=$encoded_output" >> $GITHUB_OUTPUT
        fi

    - name: ls files
      run: |
        if [[ -d src/content/cars ]]; then ls -al src/content/cars; fi
        if [[ -d src/content/used_cars ]]; then ls -al src/content/used_cars; fi
        if [[ -d src/content/special-offers ]]; then ls -al src/content/special-offers; fi
        if [[ -d src/content/news ]]; then ls -al src/content/news; fi
        if [[ -d src/content/seo ]]; then ls -al src/content/seo; fi
        if [[ -d src/data ]]; then ls -al src/data; fi
        if [[ -d tmp/feeds/new ]]; then ls -al tmp/feeds/new; fi
        if [[ -d tmp/feeds/used_cars ]]; then ls -al tmp/feeds/used_cars; fi

    - name: Check for changes
      id: check_changes
      run: |
        status_output=$(git status --short --untracked-files=all | grep -vE '^.. (output(_wrapped)?\.txt|cars(_friend)?\.xml)$' || true)
        if [[ -n "$status_output" ]]; then
          echo 'check_changes true — git status'
          printf '%s\n' "$status_output"
          echo "changes=true" >> $GITHUB_ENV
          echo "changes=true" >> $GITHUB_OUTPUT
        else
          echo 'check_changes false — no repo changes to commit'
          echo "changes=false" >> $GITHUB_ENV
          echo "changes=false" >> $GITHUB_OUTPUT
        fi
      continue-on-error: true

    - name: Commit files
      if: env.changes == 'true'
      run: |
        git config --local user.email "support+actions@github.com"
        git config --local user.name "github-actions-bot"
        if [[ -d public/img/thumbs && $(find public/img/thumbs -type f -name "*.webp") ]]; then git add public/img/thumbs/*.webp; fi
        if [[ -d public/img/thumbs_used && $(find public/img/thumbs_used -type f -name "*.webp") ]]; then git add public/img/thumbs_used/*.webp; fi
        if [[ -d src/content/cars && $(find src/content/cars -type f -name "*.mdx") ]]; then git add src/content/cars/*.mdx; fi
        if [[ -d src/content/used_cars && $(find src/content/used_cars -type f -name "*.mdx") ]]; then git add src/content/used_cars/*.mdx; fi
        if [[ "$GITHUB_REF_NAME" != "master" ]]; then
          if [[ -f src/data/dealer-models_cars_price.json ]]; then git add src/data/dealer-models_cars_price.json --force; fi
        fi
        if [[ -f public/cars.xml ]]; then git add public/cars.xml; fi
        if [[ -f public/used_cars.xml ]]; then git add public/used_cars.xml; fi
        if [[ -f public/autoru.xml ]]; then git add public/autoru.xml; fi
        if [[ -f public/avito.xml ]]; then git add public/avito.xml; fi
        git commit -m "Update cars from XML" -a || echo "No changes to commit"
        git remote set-url origin https://git:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
        git push origin $GITHUB_REF_NAME
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trigger Pages deploy
      if: env.changes == 'true'
      run: |
        payload=$(printf '{"ref":"%s"}' "$GITHUB_REF_NAME")
        curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/action-pages.yml/dispatches" \
          -d "$payload"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    outputs:
      changes: ${{ steps.check_changes.outputs.changes }}
      script_output: ${{ steps.set_output.outputs.script_output }}

  notify_telegram_error:
    needs: build
    if: ${{ needs.build.outputs.script_output != '' }}
    uses: ./.github/workflows/github-telegram.yml
    with:
      additional-text: |
        ${{ needs.build.outputs.script_output }}
    secrets:
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO_ERROR }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
